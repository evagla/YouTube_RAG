debug: false

llm:
  model: "llama3.2:latest"
  provider: "ollama"
  api_url: "http://localhost:11434/api/chat"
  temperature: 0.2
  max_tokens: 1024

embeddings:
  model: "all-MiniLM-L6-v2"
  dim: 384
  device: "auto"

reranker:
  model: "BAAI/bge-reranker-base"

chunking:
  max_chars: 500
  overlap: 100

retrieval:
  top_k: 5
  candidates: 15
  truncate_length: 300

database:
  host: "localhost"
  port: 5432
  name: "youtube_rag"
  user: ""