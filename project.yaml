project:
  name: youtube_rag
  version: 1.0.0
  description: "RAG‑system based on YouTube‑transcript and metadata."

paths:
  app: app/
  ingestion: app/ingestion/
  ingestion_youtube: app/ingestion/youtube/
  processing: app/processing/
  rag: app/rag/
  retrieval: app/retrieval/
  db: app/db/
  tests: tests/

dependencies:
  - psycopg2-binary
  - sentence-transformers
  - numpy
  - pyyaml
  - requests
  - fastapi
  - uvicorn
  - python-dotenv

files:

  # -------------------------
  # Root files
  # -------------------------
  .gitignore: |
    __pycache__/
    *.pyc
    .env
    .venv/
    venv/
    .idea/
    .vscode/
    dist/
    build/
    logs/
    *.log

  .env.example: |
    DB_USER=raguser
    DB_PASSWORD=ragpass
    DB_NAME=youtube_rag

  requirements.txt: |
    psycopg2-binary
    sentence-transformers
    numpy
    pyyaml
    requests
    fastapi
    uvicorn
    python-dotenv

  docker-compose.yml: |
    version: "3.9"
    services:
      db:
        image: ankane/pgvector
        container_name: rag_postgres
        environment:
          POSTGRES_USER: raguser
          POSTGRES_PASSWORD: ragpass
          POSTGRES_DB: youtube_rag
        ports:
          - "5432:5432"
        volumes:
          - postgres_data:/var/lib/postgresql/data
    volumes:
      postgres_data:

  README.md: |
    # YouTube RAG Project

    Ett RAG‑system baserat på YouTube‑transkript och metadata.

    ## Struktur
    - ingestion/ — metadata + transkript
    - processing/ — chunking, embeddings, preprocessing
    - retrieval/ — query expansion, retrieval, reranking
    - rag/ — RAG‑pipeline + LLM‑klient
    - db/ — schema + DB‑anslutning
    - tests/ — testsvit

    ## Konfiguration
    - settings.yaml innehåller icke‑hemlig konfiguration
    - .env innehåller hemligheter (DB‑credentials)

